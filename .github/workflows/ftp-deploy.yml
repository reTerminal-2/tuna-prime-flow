name: Deploy to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER || 'ftpupload.net' }}
          username: ${{ secrets.FTP_USERNAME || 'if0_41108542' }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./htdocs/
          state-name: .ftp-deploy-sync-state.json
          dry-run: false
          # InfinityFree can be slow and timeout, so we increase the timeout if possible
          # Note: The action doesn't have a direct timeout param, but we set state-name to track progress
